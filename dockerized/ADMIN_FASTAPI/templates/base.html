<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Restore — Admin Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(30,41,59,0.6); backdrop-filter: blur(12px); }
    @keyframes fade-in { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:none } }
    .animate-fade-in { animation: fade-in 0.25s ease-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 min-h-screen text-slate-100">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 border-b border-slate-700/40 bg-slate-900/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">

        <div class="flex items-center gap-3">
          <span class="text-2xl">🛡️</span>
          <a href="/" class="text-white font-bold text-lg tracking-tight hover:text-indigo-300 transition-colors">
            Admin Portal
          </a>
          <span class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-900/60 text-indigo-300 border border-indigo-700/40">
            JWT OAuth 2.0
          </span>
        </div>

        <div class="flex items-center gap-1">
          <a href="/" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-700/50 transition-all">
            Home
          </a>
          {% if current_user %}
          <a href="/profile" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700/50 transition-all">
            Profile
          </a>
          <a href="/api/docs" target="_blank" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-700/50 transition-all">
            API Docs
          </a>
          <a href="/logout" class="ml-1 px-4 py-2 rounded-lg text-sm font-medium bg-red-900/40 text-red-400 hover:bg-red-900/60 border border-red-800/40 transition-all">
            Logout
          </a>
          {% else %}
          <a href="/login" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700/50 transition-all">
            Login
          </a>
          <a href="/signup" class="ml-1 px-4 py-2 rounded-lg text-sm font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-all shadow-lg shadow-indigo-900/40">
            Sign Up
          </a>
          {% endif %}
        </div>

      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800/50 mt-16 py-6 text-center text-slate-600 text-xs">
    DB Restore Admin Portal &mdash; FastAPI 0.111 &middot; JWT OAuth 2.0 &middot; OWASP Hardened
  </footer>

</body>
</html>
