{% extends "base.html" %}
{% block content %}

<script>
const _CTX = {
  isAuthenticated: {{ 'true' if current_user else 'false' }},
};
</script>

<div id="index-root"></div>

<script type="text/babel">
function IndexPage() {
  const auth = _CTX.isAuthenticated;

  const features = [
    { icon: '🔐', title: 'JWT Authentication',  desc: 'OAuth 2.0 Bearer tokens with HttpOnly cookie storage and CSRF protection.' },
    { icon: '🛡️', title: 'OWASP Hardened',      desc: 'HSTS, CSP, rate limiting, input validation, and security audit logging.' },
    { icon: '👥', title: 'User Management',     desc: 'Create and manage operator accounts with bcrypt-hashed passwords.' },
    { icon: '📡', title: 'REST API',            desc: 'Full OpenAPI 3.0 spec via FastAPI. JWT tokens for programmatic access.' },
  ];

  return (
    <div className="animate-fade-in">
      {/* Hero */}
      <div className="text-center py-16">
        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-900/40 border border-indigo-700/40 text-indigo-300 text-xs font-medium mb-6">
          <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"/>
          FastAPI 2.0 &middot; Admin Portal
        </div>

        <h1 className="text-5xl sm:text-6xl font-extrabold text-white tracking-tight mb-4">
          DB Restore{' '}
          <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
            Admin
          </span>
        </h1>
        <p className="text-xl text-slate-400 max-w-2xl mx-auto mb-10">
          Secure administration portal for the Database Restore Tool.
          Manage users, monitor activity, and access API documentation.
        </p>

        {auth ? (
          <div className="flex flex-wrap gap-4 justify-center">
            <a href="/profile"
               className="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold transition-all shadow-lg shadow-indigo-900/40 flex items-center gap-2">
              👤 My Profile
            </a>
            <a href="/api/docs" target="_blank"
               className="px-6 py-3 rounded-xl bg-slate-700/60 hover:bg-slate-700 border border-slate-600/60 text-slate-200 font-semibold transition-all flex items-center gap-2">
              📡 API Docs
            </a>
          </div>
        ) : (
          <div className="flex flex-wrap gap-4 justify-center">
            <a href="/login"
               className="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold transition-all shadow-lg shadow-indigo-900/40 flex items-center gap-2">
              🔐 Login
            </a>
            <a href="/signup"
               className="px-6 py-3 rounded-xl bg-slate-700/60 hover:bg-slate-700 border border-slate-600/60 text-slate-200 font-semibold transition-all flex items-center gap-2">
              📋 Sign Up
            </a>
          </div>
        )}
      </div>

      {/* Feature cards */}
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
        {features.map(f => (
          <div key={f.title} className="glass border border-slate-700/40 rounded-2xl p-6 hover:border-indigo-700/40 transition-all">
            <div className="text-3xl mb-3">{f.icon}</div>
            <h3 className="text-white font-semibold mb-2">{f.title}</h3>
            <p className="text-slate-400 text-sm leading-relaxed">{f.desc}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('index-root')).render(<IndexPage />);
</script>
{% endblock %}
