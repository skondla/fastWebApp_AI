{% extends "base.html" %}
{% block content %}

<script>
const _CTX = {
  name:  {{ (name  or '') | tojson }},
  email: {{ (current_user.email if current_user else '') | tojson }},
};
</script>

<div id="profile-root"></div>

<script type="text/babel">
function ProfilePage() {
  const { name, email } = _CTX;
  const initials = name
    ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
    : '?';

  return (
    <div className="max-w-2xl mx-auto animate-fade-in py-8">
      <h1 className="text-3xl font-bold text-white mb-8">My Profile</h1>

      <div className="glass border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
        <div className="flex items-center gap-6 mb-8">
          <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white text-2xl font-bold shadow-lg">
            {initials}
          </div>
          <div>
            <h2 className="text-2xl font-bold text-white">{name || 'Admin User'}</h2>
            <p className="text-slate-400 text-sm mt-1">{email}</p>
            <span className="inline-flex items-center gap-1.5 mt-2 px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-900/50 text-indigo-300 border border-indigo-700/40">
              <span className="w-1.5 h-1.5 rounded-full bg-indigo-400"/>
              Admin
            </span>
          </div>
        </div>

        <div className="grid sm:grid-cols-2 gap-4">
          <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
            <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">Email</p>
            <p className="text-slate-200 text-sm font-medium">{email || '—'}</p>
          </div>
          <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
            <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">Full Name</p>
            <p className="text-slate-200 text-sm font-medium">{name || '—'}</p>
          </div>
          <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
            <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">Auth Method</p>
            <p className="text-slate-200 text-sm font-medium">JWT OAuth 2.0 (HttpOnly cookie)</p>
          </div>
          <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
            <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">Portal</p>
            <p className="text-slate-200 text-sm font-medium">DB Restore Admin &mdash; FastAPI</p>
          </div>
        </div>

        <div className="mt-6 flex flex-wrap gap-3">
          <a href="/api/docs" target="_blank"
             className="px-4 py-2 rounded-lg bg-indigo-600/20 hover:bg-indigo-600/30 border border-indigo-600/30 text-indigo-300 text-sm font-medium transition-all flex items-center gap-2">
            📡 API Docs
          </a>
          <a href="/logout"
             className="px-4 py-2 rounded-lg bg-red-900/20 hover:bg-red-900/30 border border-red-800/30 text-red-400 text-sm font-medium transition-all flex items-center gap-2">
            ⏏ Logout
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('profile-root')).render(<ProfilePage />);
</script>
{% endblock %}
