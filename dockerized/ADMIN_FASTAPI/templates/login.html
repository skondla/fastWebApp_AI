{% extends "base.html" %}
{% block content %}

<script>
const _CTX = {
  error:   {{ (error   or '') | tojson }},
  message: {{ (message or '') | tojson }},
  next:    {{ (next    or '/profile') | tojson }},
};
</script>

<div id="login-root"></div>

<script type="text/babel">
const { useState } = React;

function LoginPage() {
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [remember, setRemember] = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(_CTX.error);
  const [message,  setMessage]  = useState(_CTX.message);

  function handleSubmit(e) {
    if (!email || !password) {
      e.preventDefault();
      setError('Please enter your email and password.');
      return;
    }
    setError('');
    setLoading(true);
  }

  return (
    <div className="flex items-center justify-center min-h-[78vh]">
      <div className="w-full max-w-md animate-fade-in">

        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 text-3xl mb-4">
            🔐
          </div>
          <h1 className="text-3xl font-bold text-white">Admin Login</h1>
          <p className="text-slate-400 mt-2 text-sm">Secured with JWT OAuth 2.0</p>
        </div>

        <div className="glass border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
          {message && (
            <div className="mb-5 p-4 rounded-xl bg-emerald-900/30 border border-emerald-700/40 text-emerald-300 text-sm flex items-start gap-2 animate-fade-in">
              <span className="mt-0.5">✓</span>
              <span>{message}</span>
            </div>
          )}
          {error && (
            <div className="mb-5 p-4 rounded-xl bg-red-900/30 border border-red-700/40 text-red-300 text-sm flex items-start gap-2 animate-fade-in">
              <span className="mt-0.5">✗</span>
              <span>{error}</span>
            </div>
          )}

          <form method="POST" action="/login" onSubmit={handleSubmit} noValidate>
            <input type="hidden" name="next" value={_CTX.next} />

            <div className="mb-5">
              <label className="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
              <input
                type="email" name="email" autoFocus required
                value={email} onChange={e => { setEmail(e.target.value); setError(''); }}
                placeholder="admin@example.com"
                className="w-full px-4 py-3 rounded-xl bg-slate-700/40 border border-slate-600/60 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/70 focus:border-indigo-500/40 transition-all text-sm"
              />
            </div>

            <div className="mb-5">
              <label className="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
              <input
                type="password" name="password" required
                value={password} onChange={e => { setPassword(e.target.value); setError(''); }}
                placeholder="••••••••"
                className="w-full px-4 py-3 rounded-xl bg-slate-700/40 border border-slate-600/60 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/70 focus:border-indigo-500/40 transition-all text-sm"
              />
            </div>

            <div className="mb-6 flex items-center gap-2.5">
              <input
                type="checkbox" id="remember" name="remember" value="1"
                checked={remember} onChange={e => setRemember(e.target.checked)}
                className="w-4 h-4 rounded bg-slate-700 border-slate-600 accent-indigo-500"
              />
              <label htmlFor="remember" className="text-sm text-slate-400 cursor-pointer">
                Remember me for 7 days
              </label>
            </div>

            <button type="submit" disabled={loading}
              className="w-full py-3 px-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-indigo-900/40"
            >
              {loading ? (
                <>
                  <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                  </svg>
                  Authenticating…
                </>
              ) : (
                <>🔐 Login &amp; get JWT token</>
              )}
            </button>
          </form>
        </div>

        <p className="text-center text-slate-500 mt-5 text-sm">
          No account?{' '}
          <a href="/signup" className="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">
            Sign Up
          </a>
        </p>
        <p className="text-center text-slate-600 mt-2 text-xs">
          Developers:{' '}
          <a href="/api/docs" target="_blank" className="text-slate-500 hover:text-slate-400 transition-colors">
            POST /auth/token
          </a>{' '}for programmatic JWT access
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('login-root')).render(<LoginPage />);
</script>
{% endblock %}
