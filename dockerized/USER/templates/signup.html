<!-- templates/signup.html — FastAPI user registration UI -->
{% extends "base.html" %}

{% block content %}
<div class="column is-5 is-offset-3">
    <h3 class="title">&#128221; Create Account</h3>
    <p class="subtitle has-text-white-ter">Sign up to access the DB Restore Tool</p>

    <div class="box">
        {% if error %}
        <div class="notification is-danger is-light">
            ❌ {{ error }}
            <a href="/login">Go to login page</a>.
        </div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="field">
                <label class="label">Email</label>
                <div class="control has-icons-left">
                    <input class="input is-medium"
                           type="email"
                           name="email"
                           placeholder="your@email.com"
                           autocomplete="email"
                           required
                           autofocus>
                    <span class="icon is-small is-left">&#9993;</span>
                </div>
            </div>

            <div class="field">
                <label class="label">Full Name</label>
                <div class="control has-icons-left">
                    <input class="input is-medium"
                           type="text"
                           name="name"
                           placeholder="Jane Smith"
                           autocomplete="name"
                           required>
                    <span class="icon is-small is-left">&#128100;</span>
                </div>
            </div>

            <div class="field">
                <label class="label">Password</label>
                <div class="control has-icons-left">
                    <input class="input is-medium"
                           type="password"
                           name="password"
                           placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
                           autocomplete="new-password"
                           minlength="8"
                           required>
                    <span class="icon is-small is-left">&#128274;</span>
                </div>
                <p class="help">Minimum 8 characters. Passwords are hashed with bcrypt.</p>
            </div>

            <div class="field mt-4">
                <button class="button is-success is-medium is-fullwidth">
                    Create Account
                </button>
            </div>
        </form>
    </div>

    <p class="has-text-centered has-text-white-ter">
        Already have an account?
        <a href="/login" class="has-text-white"><strong>Login</strong></a>
    </p>
</div>
{% endblock %}
