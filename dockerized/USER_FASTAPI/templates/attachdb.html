{% extends "base.html" %}
{% block content %}

<script>
const _CTX = {
  name:      {{ (name      or '') | tojson }},
  client_ip: {{ (client_ip or '') | tojson }},
  error:     {{ (error     or '') | tojson }},
};

const INSTANCE_CLASSES = [
  { group: 'T3 family',  options: ['db.t3.micro','db.t3.small','db.t3.medium','db.t3.xlarge','db.t3.2xlarge'] },
  { group: 'T2 family',  options: ['db.t2.micro','db.t2.small','db.t2.medium','db.t2.large','db.t2.2xlarge'] },
  { group: 'M5 family',  options: ['db.m5.large','db.m5.xlarge','db.m5.2xlarge','db.m5.4xlarge'] },
  { group: 'M6g family', options: ['db.m6g.large','db.m6g.xlarge','db.m6g.2xlarge','db.m6g.4xlarge'] },
  { group: 'R5 family',  options: ['db.r5.large','db.r5.xlarge','db.r5.2xlarge','db.r5.4xlarge','db.r5.8xlarge'] },
  { group: 'R6g family', options: ['db.r6g.large','db.r6g.xlarge','db.r6g.2xlarge','db.r6g.4xlarge'] },
];
</script>

<div id="attachdb-root"></div>

<script type="text/babel">
const { useState } = React;

function AttachDBPage() {
  const [endpoint,  setEndpoint]  = useState('');
  const [instClass, setInstClass] = useState('db.t3.small');
  const [filter,    setFilter]    = useState('');
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState(_CTX.error);

  const isCluster = endpoint.toLowerCase().includes('cluster');

  const flatClasses = INSTANCE_CLASSES.flatMap(g =>
    g.options.map(o => ({ group: g.group, value: o }))
  );
  const filtered = filter
    ? flatClasses.filter(c => c.value.includes(filter.toLowerCase()))
    : flatClasses;

  function handleSubmit(e) {
    if (!endpoint) {
      e.preventDefault();
      setError('Cluster endpoint is required.');
      return;
    }
    if (!isCluster) {
      e.preventDefault();
      setError('Endpoint must be a cluster endpoint (URL must contain "cluster").');
      return;
    }
    setError('');
    setLoading(true);
  }

  return (
    <div className="max-w-2xl mx-auto animate-fade-in">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <span className="text-3xl">🔗</span>
          <h1 className="text-3xl font-bold text-white">Attach DB Instance to Cluster</h1>
        </div>
        <p className="text-slate-400 text-sm">
          Welcome, <span className="text-slate-200 font-medium">{_CTX.name}</span>
          {_CTX.client_ip && (
            <> &mdash; <span className="text-slate-500">Client IP: {_CTX.client_ip}</span></>
          )}
        </p>
      </div>

      {error && (
        <div className="mb-5 p-4 rounded-xl bg-red-900/30 border border-red-700/40 text-red-300 text-sm flex items-start gap-2 animate-fade-in">
          <span className="mt-0.5">✗</span>
          <span>{error}{' '}<a href="/login" className="underline hover:text-red-200">Return to login</a>.</span>
        </div>
      )}

      <div className="glass border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
        <form method="POST" action="/attachdb" onSubmit={handleSubmit} noValidate>

          <div className="mb-6">
            <label className="block text-sm font-medium text-slate-300 mb-1.5">
              DB Cluster Endpoint
            </label>
            <input
              type="text" name="endpoint" required
              value={endpoint} onChange={e => { setEndpoint(e.target.value); setError(''); }}
              placeholder="cluster.xxxx.us-east-1.rds.amazonaws.com"
              className={`w-full px-4 py-3 rounded-xl bg-slate-700/40 border text-sm font-mono placeholder-slate-500 focus:outline-none focus:ring-2 transition-all ${
                endpoint && !isCluster
                  ? 'border-red-600/60 focus:ring-red-500/50 text-red-300'
                  : endpoint && isCluster
                  ? 'border-emerald-600/60 focus:ring-emerald-500/50 text-emerald-300'
                  : 'border-slate-600/60 focus:ring-blue-500/70 text-blue-300'
              }`}
            />
            <div className="mt-1.5 flex items-center gap-2">
              {endpoint && isCluster && (
                <span className="text-xs text-emerald-400 flex items-center gap-1">
                  <span>✓</span> Valid cluster endpoint
                </span>
              )}
              {endpoint && !isCluster && (
                <span className="text-xs text-red-400 flex items-center gap-1">
                  <span>✗</span> Must be a cluster endpoint (URL contains "cluster")
                </span>
              )}
              {!endpoint && (
                <span className="text-xs text-slate-500">Must be a cluster endpoint (URL contains "cluster").</span>
              )}
            </div>
          </div>

          <div className="mb-8">
            <label className="block text-sm font-medium text-slate-300 mb-1.5">
              Instance Class
            </label>
            <div className="mb-2">
              <input
                type="text" placeholder="Filter instance classes…"
                value={filter} onChange={e => setFilter(e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-700/40 border border-slate-600/40 text-slate-300 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-xs"
              />
            </div>
            <div className="max-h-52 overflow-y-auto rounded-xl bg-slate-700/30 border border-slate-600/40 divide-y divide-slate-700/40">
              {filter ? (
                filtered.length === 0 ? (
                  <p className="px-4 py-3 text-sm text-slate-500">No classes match "{filter}"</p>
                ) : filtered.map(c => (
                  <label key={c.value} className="flex items-center gap-3 px-4 py-2.5 hover:bg-slate-700/40 cursor-pointer transition-colors">
                    <input
                      type="radio" name="instanceclass" value={c.value}
                      checked={instClass === c.value}
                      onChange={() => setInstClass(c.value)}
                      className="accent-blue-500"
                    />
                    <span className="text-sm font-mono text-slate-200">{c.value}</span>
                    <span className="text-xs text-slate-500 ml-auto">{c.group}</span>
                  </label>
                ))
              ) : (
                INSTANCE_CLASSES.map(g => (
                  <div key={g.group}>
                    <p className="px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-800/40">{g.group}</p>
                    {g.options.map(o => (
                      <label key={o} className="flex items-center gap-3 px-4 py-2.5 hover:bg-slate-700/40 cursor-pointer transition-colors">
                        <input
                          type="radio" name="instanceclass" value={o}
                          checked={instClass === o}
                          onChange={() => setInstClass(o)}
                          className="accent-blue-500"
                        />
                        <span className="text-sm font-mono text-slate-200">{o}</span>
                      </label>
                    ))}
                  </div>
                ))
              )}
            </div>
            <p className="text-xs text-slate-500 mt-1.5">
              Selected: <span className="text-blue-400 font-mono">{instClass}</span>
            </p>
          </div>

          <div className="flex gap-3">
            <button type="submit" disabled={loading}
              className="flex-1 py-3 px-4 rounded-xl bg-blue-600 hover:bg-blue-500 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-blue-900/40"
            >
              {loading ? (
                <>
                  <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                  </svg>
                  Attaching instance…
                </>
              ) : '🔗 Attach Instance'}
            </button>
            <button type="reset" onClick={() => { setEndpoint(''); setInstClass('db.t3.small'); setFilter(''); setError(''); }}
              className="px-6 py-3 rounded-xl bg-slate-700/60 hover:bg-slate-700 border border-slate-600/60 text-slate-300 font-medium text-sm transition-all"
            >
              ✕ Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('attachdb-root')).render(<AttachDBPage />);
</script>
{% endblock %}
