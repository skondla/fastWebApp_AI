{% extends "base.html" %}
{% block content %}

<script>
const _CTX = {
  name:      {{ (name      or '') | tojson }},
  client_ip: {{ (client_ip or '') | tojson }},
  error:     {{ (error     or '') | tojson }},
};
</script>

<div id="agent-root"></div>

<script type="text/babel">
const { useState } = React;

function AgentWorkflowPage() {
  const [snapshot, setSnapshot] = useState('');
  const [endpoint, setEndpoint] = useState('');
  const [instanceClass, setInstanceClass] = useState('');
  const [goal, setGoal] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(_CTX.error);

  function handleSubmit(e) {
    if (!snapshot || !endpoint) {
      e.preventDefault();
      setError('Snapshot Name and Source DB Endpoint are required.');
      return;
    }
    setError('');
    setLoading(true);
  }

  return (
    <div className="max-w-2xl mx-auto animate-fade-in">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <span className="text-3xl">🤖</span>
          <h1 className="text-3xl font-bold text-white">Agent Restore Workflow</h1>
        </div>
        <p className="text-slate-400 text-sm">
          Welcome, <span className="text-slate-200 font-medium">{_CTX.name}</span>
          {_CTX.client_ip && (
            <> &mdash; <span className="text-slate-500">Client IP: {_CTX.client_ip}</span></>
          )}
        </p>
        <p className="text-slate-500 text-xs mt-2 max-w-xl">
          A Claude-powered orchestrator plans and executes restore &rarr; status check
          &rarr; optional attach &rarr; notify as a single workflow, instead of three
          separate manual steps.
        </p>
      </div>

      {error && (
        <div className="mb-5 p-4 rounded-xl bg-red-900/30 border border-red-700/40 text-red-300 text-sm flex items-start gap-2 animate-fade-in">
          <span className="mt-0.5">✗</span>
          <span>{error}{' '}<a href="/login" className="underline hover:text-red-200">Return to login</a>.</span>
        </div>
      )}

      <div className="glass border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
        <form method="POST" action="/agent/restore-workflow" onSubmit={handleSubmit} noValidate>

          <div className="mb-6">
            <label className="block text-sm font-medium text-slate-300 mb-1.5">
              Snapshot Name
            </label>
            <input
              type="text" name="snapshotname" required
              value={snapshot} onChange={e => { setSnapshot(e.target.value); setError(''); }}
              placeholder="e.g. my-db-snapshot-2024"
              className="w-full px-4 py-3 rounded-xl bg-slate-700/40 border border-slate-600/60 text-purple-300 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/70 transition-all text-sm font-mono"
            />
          </div>

          <div className="mb-6">
            <label className="block text-sm font-medium text-slate-300 mb-1.5">
              Source DB Endpoint
            </label>
            <input
              type="text" name="endpoint" required
              value={endpoint} onChange={e => { setEndpoint(e.target.value); setError(''); }}
              placeholder="e.g. mydb.cluster-xxxx.us-east-1.rds.amazonaws.com"
              className="w-full px-4 py-3 rounded-xl bg-slate-700/40 border border-slate-600/60 text-purple-300 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/70 transition-all text-sm font-mono"
            />
          </div>

          <div className="mb-6">
            <label className="block text-sm font-medium text-slate-300 mb-1.5">
              Target Instance Class <span className="text-slate-500 font-normal">(optional — attach after restore)</span>
            </label>
            <input
              type="text" name="instanceclass"
              value={instanceClass} onChange={e => setInstanceClass(e.target.value)}
              placeholder="e.g. db.r5.large"
              className="w-full px-4 py-3 rounded-xl bg-slate-700/40 border border-slate-600/60 text-purple-300 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/70 transition-all text-sm font-mono"
            />
          </div>

          <div className="mb-8">
            <label className="block text-sm font-medium text-slate-300 mb-1.5">
              Goal <span className="text-slate-500 font-normal">(optional — free-text instructions for the agent)</span>
            </label>
            <textarea
              name="goal" rows="3"
              value={goal} onChange={e => setGoal(e.target.value)}
              placeholder="e.g. Restore this snapshot and attach a reader once it's ready."
              className="w-full px-4 py-3 rounded-xl bg-slate-700/40 border border-slate-600/60 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/70 transition-all text-sm"
            />
          </div>

          <div className="flex gap-3">
            <button type="submit" disabled={loading}
              className="flex-1 py-3 px-4 rounded-xl bg-purple-600 hover:bg-purple-500 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-purple-900/40"
            >
              {loading ? (
                <>
                  <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                  </svg>
                  Running agent workflow…
                </>
              ) : '🤖 Run Agent Workflow'}
            </button>
            <button type="reset" onClick={() => { setSnapshot(''); setEndpoint(''); setInstanceClass(''); setGoal(''); setError(''); }}
              className="px-6 py-3 rounded-xl bg-slate-700/60 hover:bg-slate-700 border border-slate-600/60 text-slate-300 font-medium text-sm transition-all"
            >
              ✕ Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('agent-root')).render(<AgentWorkflowPage />);
</script>
{% endblock %}
