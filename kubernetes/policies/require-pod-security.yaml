---
# Cluster-enforced pod hardening. The deployment manifests already set these;
# this policy guarantees no workload can regress them. Mirrors the Pod
# Security Standards "restricted" profile plus read-only root filesystem
# (which PSS alone does not require).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pod-security
  annotations:
    policies.kyverno.io/title: Require restricted pod security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [fastapi-namespace, fastapi-admin-namespace]
      validate:
        message: "Containers must run as non-root (runAsNonRoot: true)."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true

    - name: seccomp-runtime-default
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [fastapi-namespace, fastapi-admin-namespace]
      validate:
        message: "Pods must set seccompProfile.type=RuntimeDefault (or Localhost)."
        pattern:
          spec:
            securityContext:
              seccompProfile:
                type: "RuntimeDefault | Localhost"

    - name: drop-all-capabilities-no-escalation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [fastapi-namespace, fastapi-admin-namespace]
      validate:
        message: >-
          Every container must drop ALL capabilities and disable privilege
          escalation.
        pattern:
          spec:
            =(initContainers):
              - securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: [ALL]
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: [ALL]

    - name: read-only-root-filesystem
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [fastapi-namespace, fastapi-admin-namespace]
      validate:
        message: "App containers must use a read-only root filesystem."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
---
# Enforce (not just label) Pod Security Standards on the app namespaces:
# any namespace matching fastapi-* must carry the restricted PSS labels.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pss-restricted-labels
  annotations:
    policies.kyverno.io/title: Require PSS restricted labels on app namespaces
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-restricted-labels
      match:
        any:
          - resources:
              kinds: [Namespace]
              names: ["fastapi-*"]
      validate:
        message: >-
          App namespaces must enforce the 'restricted' Pod Security Standard
          (pod-security.kubernetes.io/enforce: restricted).
        pattern:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: restricted
