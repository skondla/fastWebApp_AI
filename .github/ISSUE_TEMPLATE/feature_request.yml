name: Feature request
description: Propose an enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations: { required: true }
  - type: dropdown
    id: security-relevant
    attributes:
      label: Security relevant?
      options: ["No", "Yes — touches auth/pipeline/policy (needs ADR)"]
    validations: { required: true }
