name: "DevSecOps — FastAPI USER — AWS EKS"

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [master, main]
    paths:
      - "dockerized/USER_FASTAPI/**"
      - "aws/eks/deploy/manifest/fastapi1/**"
      - "aws/eks/deploy/terraform-fastapi/**"
  pull_request:
    branches: [master, main]
    paths:
      - "dockerized/USER_FASTAPI/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

# ─── Global env ───────────────────────────────────────────────────────────────
env:
  AWS_REGION:      us-east-1
  EKS_CLUSTER:     fastapi-demo-cluster
  ECR_REPOSITORY:  fastapi-user-app
  APP_NAME:        fastapi-user-app
  EKS_NAMESPACE:   fastapi-namespace
  APP_PORT:        "50443"
  IMAGE_TAG:       ${{ github.sha }}
  PYTHON_VERSION:  "3.11"
  AWS_SECRETS_MANAGER_SECRET_ARN: ${{ secrets.AWS_SECRETS_MANAGER_SECRET_ARN }}

# ─── Concurrency guard ────────────────────────────────────────────────────────
# One run per workflow+ref. A new push supersedes an in-flight PR run; pushes
# to main queue behind the running deploy instead of racing it (fixes the
# two-deploys-race / last-write-silently-wins failure mode).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab
  id-token: write           # OIDC for AWS authentication

jobs:
# ════════════════════════════════════════════════════════════════════════════
# 1. SECRET SCANNING — prevent credentials from reaching the repo
# ════════════════════════════════════════════════════════════════════════════
  secret-scan:
    name: "🔍 Secret Scan (TruffleHog)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: TruffleHog — scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: GitLeaks — scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ════════════════════════════════════════════════════════════════════════════
# 2. SAST — static application security testing (OWASP A03, A07)
# ════════════════════════════════════════════════════════════════════════════
  sast:
    name: "🔬 SAST (Bandit + Semgrep)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SAST tools
        run: pip install bandit semgrep

      - name: Bandit — Python SAST (OWASP Top 10)
        run: |
          bandit -r dockerized/USER_FASTAPI/ \
            --configfile dockerized/USER_FASTAPI/.bandit \
            --format sarif \
            --output bandit-results.sarif \
            --severity-level high

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Semgrep — OWASP Top 10 rules
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/jwt \
            --config p/secrets \
            --config dockerized/USER_FASTAPI/.semgrep.yml \
            dockerized/USER_FASTAPI/ \
            --error --sarif --output semgrep-results.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload SAST artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: "*.sarif"
          retention-days: 30

# ════════════════════════════════════════════════════════════════════════════
# 3. SCA — software composition analysis (OWASP A06)
# ════════════════════════════════════════════════════════════════════════════
  sca:
    name: "📦 SCA (pip-audit + Safety + Trivy FS)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SCA tools
        run: pip install pip-audit

      - name: pip-audit — dependency vulnerability scan
        run: |
          pip-audit \
            -r dockerized/USER_FASTAPI/requirements.txt \
            --format sarif \
            --output pip-audit-results.sarif

      - name: Upload pip-audit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit-results.sarif
          category: pip-audit

      - name: Trivy — filesystem SCA scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: dockerized/USER_FASTAPI/
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

# ════════════════════════════════════════════════════════════════════════════
# 4. BUILD & PUSH — Docker image to ECR
# ════════════════════════════════════════════════════════════════════════════
  build:
    name: "🐳 Build & Push to ECR"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, sca]
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        working-directory: dockerized/USER_FASTAPI
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker build \
            --label "git.commit=${GITHUB_SHA}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

# ════════════════════════════════════════════════════════════════════════════
# 5. CONTAINER SCAN — Trivy image scan (OWASP A06)
# ════════════════════════════════════════════════════════════════════════════
  container-scan:
    name: "🔎 Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run Trivy image vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

# ════════════════════════════════════════════════════════════════════════════
# 6. IaC SCAN — Terraform security (Checkov)
# ════════════════════════════════════════════════════════════════════════════
  iac-scan:
    name: "🏗️ IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov — Terraform + K8s security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: aws/eks/deploy/terraform-fastapi
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false

      - name: Checkov — Kubernetes manifests scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: aws/eks/deploy/manifest/fastapi1
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s-results.sarif
          soft_fail: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov-terraform

# ════════════════════════════════════════════════════════════════════════════
# 7. SIGN & SBOM
# ════════════════════════════════════════════════════════════════════════════
  sign-and-sbom:
    name: "🔏 Sign Image & Generate SBOM"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Keyless sign the image
        run: cosign sign --yes "${{ needs.build.outputs.image }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.image }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM to the image
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${{ needs.build.outputs.image }}"

      - name: Generate SLSA provenance predicate
        run: |
          cat > provenance.json <<PRED
          {
            "buildDefinition": {
              "buildType": "https://actions.github.io/buildtypes/workflow/v1",
              "externalParameters": {
                "workflow": {
                  "ref": "${GITHUB_REF}",
                  "repository": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}",
                  "path": "${GITHUB_WORKFLOW_REF}"
                }
              },
              "internalParameters": {
                "github": {
                  "event_name": "${GITHUB_EVENT_NAME}",
                  "run_id": "${GITHUB_RUN_ID}",
                  "run_attempt": "${GITHUB_RUN_ATTEMPT}"
                }
              },
              "resolvedDependencies": [
                {
                  "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${GITHUB_REF}",
                  "digest": { "gitCommit": "${GITHUB_SHA}" }
                }
              ]
            },
            "runDetails": {
              "builder": { "id": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows" },
              "metadata": {
                "invocationId": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
              }
            }
          }
          PRED

      - name: Attest SLSA provenance to the image
        run: cosign attest --yes --predicate provenance.json --type slsaprovenance1 "${{ needs.build.outputs.image }}"

      - uses: actions/upload-artifact@v4
        with: { name: sbom-eks-user, path: sbom.spdx.json }

# ════════════════════════════════════════════════════════════════════════════
# 8. DEPLOY — Apply manifests to EKS
# ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy via ArgoCD"
    runs-on: ubuntu-latest
    needs: [build, container-scan, iac-scan, sign-and-sbom]
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Point ArgoCD at the new image and sync
        env:
          FASTAPI_IMAGE: ${{ needs.build.outputs.image }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app set fastapi-user-eks --kustomize-image "${FASTAPI_IMAGE}"
          argocd app sync fastapi-user-eks --prune
          argocd app wait fastapi-user-eks --health --timeout 300

# ════════════════════════════════════════════════════════════════════════════
# 9. DAST — OWASP ZAP dynamic scan (post-deploy)
# ════════════════════════════════════════════════════════════════════════════
  dast:
    name: "⚡ DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Resolve load balancer hostname
        id: lb
        run: |
          LB=$(kubectl get svc ${APP_NAME} -n ${EKS_NAMESPACE} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "url=https://${LB}:${APP_PORT}" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          curl -sk --max-time 30 "${{ steps.lb.outputs.url }}/" | grep -i "DB Restore" \
            && echo "✅ Smoke test passed" \
            || echo "⚠️  Smoke test inconclusive (LB may still be provisioning)"

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.lb.outputs.url }}
          rules_file_name: "dockerized/USER_FASTAPI/.zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false
          fail_action: true

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

# ════════════════════════════════════════════════════════════════════════════
# 9b. DAST ON PULL REQUESTS — ZAP against a locally-run candidate container
#     Closes the "DAST runs main/master only" gap: regressions are caught
#     before merge, without needing cloud credentials on PRs.
# ════════════════════════════════════════════════════════════════════════════
  dast-pr:
    name: "⚡ DAST on PR (ZAP vs local container)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [secret-scan, sast, sca]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: skondla
          POSTGRES_PASSWORD: password
          POSTGRES_DB: flaskapp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U skondla"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Build candidate image locally (no push)
        run: docker build -t fastapi-user-app:pr dockerized/USER_FASTAPI

      - name: Run the candidate container
        run: |
          # Bridge network; Postgres service port is published on the host,
          # reachable from the container via the docker bridge gateway.
          docker run -d --name app -p 50443:50443 \
            -e shost=172.17.0.1 -e sport=5432 \
            -e suser=skondla -e spassword=password -e sdatabase=flaskapp \
            fastapi-user-app:pr
          for i in $(seq 1 30); do
            curl -skf https://localhost:50443/healthz && exit 0
            sleep 2
          done
          echo "App failed to become healthy"; docker logs app; exit 1

      - name: OWASP ZAP baseline scan (PR gate)
        run: |
          set +e
          docker run --rm --network host \
            -v "$(pwd):/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t https://localhost:50443 \
            -c dockerized/USER_FASTAPI/.zap/rules.tsv \
            -a -w zap-pr-report.md
          rc=$?
          set -e
          # zap-baseline: 0=pass, 1=FAIL alerts, 2=WARN alerts. Gate on FAILs.
          if [ "$rc" -eq 1 ]; then
            echo "ZAP reported FAIL-level alerts — blocking the PR"; exit 1
          fi

      - name: Publish ZAP report to job summary
        if: always()
        run: cat zap-pr-report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: App logs on failure
        if: failure()
        run: docker logs app || true

# ════════════════════════════════════════════════════════════════════════════
# 10. NOTIFY — Slack
# ════════════════════════════════════════════════════════════════════════════
  notify:
    name: "📣 Notify Slack"
    runs-on: ubuntu-latest
    needs: [deploy, dast]
    if: always()
    steps:
      - name: Post result to Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "*FastAPI USER App — EKS Deploy*",
              "attachments": [{
                "color": "${{ needs.deploy.result == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "Deploy",  "value": "${{ needs.deploy.result }}",  "short": true},
                  {"title": "DAST",    "value": "${{ needs.dast.result }}",    "short": true},
                  {"title": "Branch",  "value": "${{ github.ref_name }}",      "short": true},
                  {"title": "Commit",  "value": "${{ github.sha }}",           "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
