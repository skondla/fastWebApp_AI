name: "AI Security Triage (SARIF → Claude)"

# Agentic triage of the SARIF findings the pipeline already produces.
# Nightly (and on demand) this pulls every open code-scanning alert from the
# GitHub Security tab, has Claude deduplicate, rank by exploitability in THIS
# codebase, and propose concrete fixes — then publishes the triage report to
# the job summary and keeps a single rolling GitHub issue up to date.
# Requires the ANTHROPIC_API_KEY repository secret.

on:
  schedule:
    - cron: "17 6 * * *"   # daily 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: read
  issues: write

concurrency:
  group: ai-security-triage
  cancel-in-progress: false

jobs:
  triage:
    name: "🤖 Triage code-scanning alerts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install triage agent deps
        run: pip install -r ai/requirements.txt

      - name: Run Claude triage over open alerts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ai/triage/sarif_triage.py --output triage-report.md
          cat triage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert the rolling triage issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🤖 AI security triage — latest report"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" \
            --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file triage-report.md
          else
            gh issue create --title "$TITLE" --body-file triage-report.md \
              --label security
          fi
