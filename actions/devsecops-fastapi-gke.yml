name: "DevSecOps — FastAPI USER — GCP GKE"

on:
  push:
    branches: [master, main, testing_on_gcp]
    paths:
      - "dockerized/USER_FASTAPI/**"
      - "gcp/gke/deploy/manifests/fastapi1/**"
  pull_request:
    branches: [master, main]
    paths:
      - "dockerized/USER_FASTAPI/**"
  workflow_dispatch:

env:
  GKE_PROJECT:    ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER:    fastapi-demo-cluster
  GKE_REGION:     us-east4
  GKE_ZONE:       us-east4-a
  GKE_NAMESPACE:  fastapi-namespace
  GKE_SA:         fastapi-serviceaccount
  APP_NAME:       fastapi-user-app
  APP_PORT:       "50443"
  IMAGE_TAG:      ${{ github.sha }}
  PYTHON_VERSION: "3.11"
  GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}

# One run per workflow+ref: PR runs are superseded by newer pushes; deploys
# queue instead of racing (fixes last-write-silently-wins).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
# ════════════════════════════════════════════════════════════════════════════
# 1. SECRET SCAN
# ════════════════════════════════════════════════════════════════════════════
  secret-scan:
    name: "🔍 Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

# ════════════════════════════════════════════════════════════════════════════
# 2. SAST
# ════════════════════════════════════════════════════════════════════════════
  sast:
    name: "🔬 SAST (Bandit + Semgrep)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit semgrep

      - name: Bandit
        run: |
          bandit -r dockerized/USER_FASTAPI/ \
            --configfile dockerized/USER_FASTAPI/.bandit \
            --format sarif --output bandit-results.sarif \
            --severity-level high
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: bandit-results.sarif, category: bandit }

      - name: Semgrep
        run: |
          semgrep \
            --config p/owasp-top-ten --config p/python \
            --config p/jwt --config p/secrets \
            --config dockerized/USER_FASTAPI/.semgrep.yml \
            dockerized/USER_FASTAPI/ \
            --error --sarif --output semgrep-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: semgrep-results.sarif, category: semgrep }

# ════════════════════════════════════════════════════════════════════════════
# 3. SCA
# ════════════════════════════════════════════════════════════════════════════
  sca:
    name: "📦 SCA (pip-audit + Trivy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - name: pip-audit
        run: |
          pip-audit -r dockerized/USER_FASTAPI/requirements.txt \
            --format sarif --output pip-audit-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: pip-audit-results.sarif, category: pip-audit }
      - name: Trivy FS
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: dockerized/USER_FASTAPI/
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-fs-results.sarif, category: trivy-fs }

# ════════════════════════════════════════════════════════════════════════════
# 4. BUILD & PUSH — Google Artifact Registry
# ════════════════════════════════════════════════════════════════════════════
  build:
    name: "🐳 Build & Push to GAR"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, sca]
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GKE_REGION }}-docker.pkg.dev

      - name: Build and push
        id: build-image
        working-directory: dockerized/USER_FASTAPI
        run: |
          IMAGE="${GKE_REGION}-docker.pkg.dev/${GKE_PROJECT}/${GKE_PROJECT}/${APP_NAME}:${IMAGE_TAG}"
          docker build \
            --label "git.commit=${GITHUB_SHA}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

# ════════════════════════════════════════════════════════════════════════════
# 5. CONTAINER SCAN
# ════════════════════════════════════════════════════════════════════════════
  container-scan:
    name: "🔎 Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-image-results.sarif, category: trivy-image }

# ════════════════════════════════════════════════════════════════════════════
# 6. IaC SCAN (Checkov)
# ════════════════════════════════════════════════════════════════════════════
  iac-scan:
    name: "🏗️ IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: gcp/gke/deploy/terraform-fastapi
          framework: terraform
          soft_fail: false
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: gcp/gke/deploy/manifests/fastapi1
          framework: kubernetes
          soft_fail: false

# ════════════════════════════════════════════════════════════════════════════
# 7. SIGN & SBOM
# ════════════════════════════════════════════════════════════════════════════
  sign-and-sbom:
    name: "🔏 Sign Image & Generate SBOM"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GKE_REGION }}-docker.pkg.dev

      - name: Keyless sign the image
        run: cosign sign --yes "${{ needs.build.outputs.image }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.image }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM to the image
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${{ needs.build.outputs.image }}"

      - name: Generate SLSA provenance predicate
        run: |
          cat > provenance.json <<PRED
          {
            "buildDefinition": {
              "buildType": "https://actions.github.io/buildtypes/workflow/v1",
              "externalParameters": {
                "workflow": {
                  "ref": "${GITHUB_REF}",
                  "repository": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}",
                  "path": "${GITHUB_WORKFLOW_REF}"
                }
              },
              "internalParameters": {
                "github": {
                  "event_name": "${GITHUB_EVENT_NAME}",
                  "run_id": "${GITHUB_RUN_ID}",
                  "run_attempt": "${GITHUB_RUN_ATTEMPT}"
                }
              },
              "resolvedDependencies": [
                {
                  "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${GITHUB_REF}",
                  "digest": { "gitCommit": "${GITHUB_SHA}" }
                }
              ]
            },
            "runDetails": {
              "builder": { "id": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows" },
              "metadata": {
                "invocationId": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
              }
            }
          }
          PRED

      - name: Attest SLSA provenance to the image
        run: cosign attest --yes --predicate provenance.json --type slsaprovenance1 "${{ needs.build.outputs.image }}"

      - uses: actions/upload-artifact@v4
        with: { name: sbom-gke-user, path: sbom.spdx.json }

# ════════════════════════════════════════════════════════════════════════════
# 8. DEPLOY — GKE
# ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy via ArgoCD"
    runs-on: ubuntu-latest
    needs: [build, container-scan, iac-scan, sign-and-sbom]
    environment: staging
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Point ArgoCD at the new image and sync
        env:
          FASTAPI_IMAGE: ${{ needs.build.outputs.image }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app set fastapi-user-gke --kustomize-image "${FASTAPI_IMAGE}"
          argocd app sync fastapi-user-gke --prune
          argocd app wait fastapi-user-gke --health --timeout 300

# ════════════════════════════════════════════════════════════════════════════
# 9. DAST
# ════════════════════════════════════════════════════════════════════════════
  dast:
    name: "⚡ DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location:     ${{ env.GKE_ZONE }}

      - name: Get LB IP
        id: svc
        run: |
          LB=$(kubectl get svc ${APP_NAME} -n ${GKE_NAMESPACE} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "url=https://${LB}:${APP_PORT}" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          curl -sk --max-time 30 "${{ steps.svc.outputs.url }}/" | grep -i "DB Restore" \
            && echo "✅ Smoke test passed" \
            || echo "⚠️  Smoke test inconclusive (LB may still be provisioning)"

      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.svc.outputs.url }}
          rules_file_name: "dockerized/USER_FASTAPI/.zap/rules.tsv"
          fail_action: true
      - uses: actions/upload-artifact@v4
        with: { name: zap-report-gke, path: report_html.html }

# ════════════════════════════════════════════════════════════════════════════
# 10. NOTIFY
# ════════════════════════════════════════════════════════════════════════════
  notify:
    name: "📣 Notify Slack"
    runs-on: ubuntu-latest
    needs: [deploy, dast]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "*FastAPI USER App — GKE Deploy: ${{ needs.deploy.result }}*",
              "attachments": [{"color": "${{ needs.deploy.result == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "DAST",   "value": "${{ needs.dast.result }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}",   "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}",        "short": true}
                ]}]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
