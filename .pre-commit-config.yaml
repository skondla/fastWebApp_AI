# Shift-left: the same classes of findings the CI gates block, caught at the
# developer keyboard. Install once: `pip install pre-commit && pre-commit install`
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-c, dockerized/USER_FASTAPI/.bandit, --severity-level, high]
        files: ^dockerized/(USER|ADMIN)_FASTAPI/.*\.py$
