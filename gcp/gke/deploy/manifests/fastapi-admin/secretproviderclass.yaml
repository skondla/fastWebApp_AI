---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: fastapi-admin-app-secrets
  namespace: fastapi-namespace
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/CHANGEME-gcp-project-number/secrets/fastapi-admin-db-host/versions/latest"
        fileName: "fastapi-admin-db-host"
      - resourceName: "projects/CHANGEME-gcp-project-number/secrets/fastapi-admin-db-port/versions/latest"
        fileName: "fastapi-admin-db-port"
      - resourceName: "projects/CHANGEME-gcp-project-number/secrets/fastapi-admin-db-user/versions/latest"
        fileName: "fastapi-admin-db-user"
      - resourceName: "projects/CHANGEME-gcp-project-number/secrets/fastapi-admin-db-password/versions/latest"
        fileName: "fastapi-admin-db-password"
      - resourceName: "projects/CHANGEME-gcp-project-number/secrets/fastapi-admin-db-name/versions/latest"
        fileName: "fastapi-admin-db-name"
      - resourceName: "projects/CHANGEME-gcp-project-number/secrets/fastapi-admin-jwt-secret-key/versions/latest"
        fileName: "fastapi-admin-jwt-secret-key"
  secretObjects:
    - secretName: fastapi-admin-db-secret
      type: Opaque
      data:
        - objectName: fastapi-admin-db-host
          key: shost
        - objectName: fastapi-admin-db-port
          key: sport
        - objectName: fastapi-admin-db-user
          key: suser
        - objectName: fastapi-admin-db-password
          key: spassword
        - objectName: fastapi-admin-db-name
          key: sdatabase
        - objectName: fastapi-admin-jwt-secret-key
          key: SECRET_KEY
