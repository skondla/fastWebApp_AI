---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: fastapi-user-app-secrets
  namespace: fastapi-namespace
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "CHANGEME-aws-secrets-manager-secret-arn"
        objectAlias: "fastapi-user-db-secret"
        objectType: "secretsmanager"
        jmesPath:
          - path: shost
            objectAlias: fastapi-user-db-host
          - path: sport
            objectAlias: fastapi-user-db-port
          - path: suser
            objectAlias: fastapi-user-db-user
          - path: spassword
            objectAlias: fastapi-user-db-password
          - path: sdatabase
            objectAlias: fastapi-user-db-name
          - path: SECRET_KEY
            objectAlias: fastapi-user-jwt-secret-key
  secretObjects:
    - secretName: fastapi-db-secret
      type: Opaque
      data:
        - objectName: fastapi-user-db-host
          key: shost
        - objectName: fastapi-user-db-port
          key: sport
        - objectName: fastapi-user-db-user
          key: suser
        - objectName: fastapi-user-db-password
          key: spassword
        - objectName: fastapi-user-db-name
          key: sdatabase
        - objectName: fastapi-user-jwt-secret-key
          key: SECRET_KEY
