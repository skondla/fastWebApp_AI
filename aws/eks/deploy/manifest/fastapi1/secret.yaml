# DEPRECATED — superseded by secretproviderclass.yaml (Secrets Store CSI Driver).
# No longer referenced by the CI deploy pipeline. Kept for local/manual use only
# (e.g. clusters without the CSI driver installed). See docs/github-secrets.md.
---
# NOTE: In production use AWS Secrets Manager + External Secrets Operator
# instead of base64-encoded values in this file.
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-db-secret
  namespace: ${EKS_NAMESPACE}
type: Opaque
stringData:
  shost:     "${DB_HOST}"
  sport:     "${DB_PORT}"
  suser:     "${DB_USER}"
  spassword: "${DB_PASSWORD}"
  sdatabase: "${DB_NAME}"
  SECRET_KEY: "${JWT_SECRET_KEY}"
