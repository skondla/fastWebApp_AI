---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-user-app
  namespace: fastapi-namespace
  labels:
    app: fastapi-user-app
    version: "latest"
    app.kubernetes.io/name: fastapi-user-app
    app.kubernetes.io/version: "latest"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi-user-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fastapi-user-app
        version: "latest"
      annotations:
        # Force redeploy on image change
        kubectl.kubernetes.io/restartedAt: "latest"
    spec:
      serviceAccountName: fastapi-sa
      automountServiceAccountToken: false

      # ── Security Context (Pod) ──────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ── Init: wait for DB ───────────────────────────────────────────────
      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: fastapi-user-app-secrets
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z "$shost" "$sport"; do
                echo "Waiting for DB at $shost:$sport..."; sleep 3
              done
          envFrom:
            - secretRef:
                name: fastapi-db-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: fastapi-user-app
          image: CHANGEME-ecr-registry-host/fastapi-user-app:latest
          imagePullPolicy: Always
          ports:
            - name: https
              containerPort: 50443
              protocol: TCP

          # ── Environment from Secret + ConfigMap ──────────────────────
          envFrom:
            - secretRef:
                name: fastapi-db-secret
            - configMapRef:
                name: fastapi-config

          # ── Resource limits ──────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          # ── Security Context (Container) ─────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]

          # ── Volumes ──────────────────────────────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true

          # ── Probes ───────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /
              port: 50443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 50443
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /
              port: 50443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

      # ── Topology spread for HA ──────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: fastapi-user-app

      restartPolicy: Always
