---
apiVersion: v1
kind: Namespace
metadata:
  name: fastapi-namespace
  labels:
    app.kubernetes.io/name: fastapi-user-app
    environment: production
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastapi-sa
  namespace: fastapi-namespace
  annotations:
    eks.amazonaws.com/role-arn: CHANGEME-eks-irsa-role-arn
